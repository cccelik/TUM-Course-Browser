<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Studiengang Planner{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-inner">
      <div class="top-bar-title">TUM Study Planner</div>
      <img class="tum-logo" src="/static/tum-logo.svg" alt="TUM logo">
    </div>
  </div>
  {% if program %}
  <header class="site-header">
    <nav class="site-nav">
      <a href="/programs/{{ program.id }}/dashboard">Dashboard</a>
      <a href="/programs/{{ program.id }}/courses">Courses</a>
      <a href="/programs/{{ program.id }}/courses/wanted">Wanted</a>
      <a href="/programs/{{ program.id }}/courses/passed">Passed</a>
      <a href="/">Programs</a>
    </nav>
  </header>
  {% endif %}

  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
